# SIEM Pipeline — Rule Engine Configuration
# This file documents rule tuning parameters.
# For runtime overrides, subclass the relevant rule and adjust class attributes.

brute_force_login:
  threshold: 5          # Number of failures to trigger
  window_seconds: 300   # Rolling window in seconds

multi_source_login:
  threshold_ips: 3
  window_seconds: 600

port_scan:
  threshold_ports: 15
  window_seconds: 60

privileged_after_hours:
  work_hour_start_utc: 6
  work_hour_end_utc: 20
  privileged_patterns:
    - admin
    - root
    - administrator
    - svc_
    - service_
    - sa_

watchlist_ips:
  # Replace with real threat-intel feed IPs
  ips:
    - 192.0.2.1
    - 198.51.100.5
    - 203.0.113.99
    - 10.0.0.254
